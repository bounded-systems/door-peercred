# flakehub-publish — thin caller of the org reusable workflow. The publish logic
# (rolling, public, on push to main) lives in bounded-systems/.github at a pinned
# SHA, so this branch can configure but not alter it. See .github#58 / #57.
name: flakehub-publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # FlakeHub OIDC (no secret)
  contents: read

concurrency:
  group: flakehub-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: bounded-systems/.github/.github/workflows/repo-flake-publish.yml@cbaa7b7bcb4dc3c0d9ca90286d720173cdb19d5e

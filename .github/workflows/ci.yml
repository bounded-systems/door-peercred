name: CI

# Gate the crate on a release build (Rust is preinstalled on the runner; the
# crate has no external deps). Linux-only — SO_PEERCRED.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: cargo build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build
        run: cargo build --release --locked
